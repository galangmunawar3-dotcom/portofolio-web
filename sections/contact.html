<section class="contact section" id="contact">
  <div class="container">
    <div class="section-header fade-in-up">
      <h2 class="section-title">contact me</h2>
      <div class="section-line"></div>
    </div>
    <div class="contact-content">
      <div class="contact-info fade-in-left">
        <h3>Let's Connect</h3>
        <p>Punya proyek menarik atau ingin berdiskusi? Jangan ragu untuk menghubungi saya saya selalu terbuka untuk tantangan baru.</p>
        <div class="contact-details">
          <div class="contact-item">
            <i class="fas fa-envelope"></i>
            <span>galangmunawar3@gmail.com</span>
          </div>
          <a href="https://www.instagram.com/glngmh_/" target="_blank" class="contact-item">
            <i class="fab fa-instagram"></i>
            <span>glngmh_</span>
          </a>
          <div class="contact-item">
            <i class="fas fa-map-marker-alt"></i>
            <span>Indonesia, BANDUNG</span>
          </div>
        </div>
      </div>
        <form class="contact-form fade-in-right" id="contactForm">
          <div class="form-group">
            <input type="text" id="name" name="name" placeholder="Nama Anda" required>
          </div>
          <div class="form-group">
            <input type="email" id="email" name="email" placeholder="Email Anda (opsional)">
          </div>
          <div class="form-group">
            <textarea id="message" name="message" rows="5" placeholder="Pesan Anda" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Kirim Pesan</button>
        </form>
    </div>
  </div>
</section>
