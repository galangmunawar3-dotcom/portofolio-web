  <rect x="170" y="200" width="100" height="30" rx="4" fill="none" stroke="#e62429" stroke-width="0.5" opacity="0.5"/>
  <!-- Spider icon -->
  <g transform="translate(340,30) scale(0.6)" fill="#e62429" opacity="0.06">
    <ellipse cx="0" cy="8" rx="8" ry="12"/>
    <ellipse cx="0" cy="-6" rx="6" ry="8"/>
    <path d="M-5,-3 Q-15,-15 -20,-8" stroke="#e62429" stroke-width="1.5" fill="none"/>
    <path d="M-6,-1 Q-18,-8 -22,-2" stroke="#e62429" stroke-width="1.5" fill="none"/>
    <path d="M-6,1 Q-18,0 -22,4" stroke="#e62429" stroke-width="1.5" fill="none"/>
    <path d="M-5,3 Q-15,5 -18,10" stroke="#e62429" stroke-width="1.5" fill="none"/>
    <path d="M5,-3 Q15,-15 20,-8" stroke="#e62429" stroke-width="1.5" fill="none"/>
    <path d="M6,-1 Q18,-8 22,-2" stroke="#e62429" stroke-width="1.5" fill="none"/>
    <path d="M6,1 Q18,0 22,4" stroke="#e62429" stroke-width="1.5" fill="none"/>
    <path d="M5,3 Q15,5 18,10" stroke="#e62429" stroke-width="1.5" fill="none"/>
