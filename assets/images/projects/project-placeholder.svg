  <path d="M0 250 L80 250 L80 0" stroke="#e62429" stroke-width="0.5" opacity="0.08"/>
  <path d="M0 220 L50 220 L50 0" stroke="#e62429" stroke-width="0.5" opacity="0.08"/>
  <!-- Code lines -->
  <rect x="60" y="50" width="280" height="24" rx="4" fill="#1a1a1a"/>
  <rect x="60" y="50" width="40" height="24" rx="4" fill="#e62429" opacity="0.15"/>
  <rect x="60" y="90" width="200" height="10" rx="3" fill="#1a1a1a"/>
  <rect x="60" y="110" width="240" height="10" rx="3" fill="#1a1a1a"/>
  <rect x="60" y="130" width="160" height="10" rx="3" fill="#1a1a1a"/>
